<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home · Logout · Dark Mode</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f8fafd;
            --text: #1a2b3c;
            --primary: #1E3C72;
            --secondary: #FF6F0F;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        body.dark-mode {
            --bg: #12121a;
            --text: #e0e0e0;
            --primary: #2a4b8c;
            --secondary: #ff944d;
            --card-bg: #2a2a3a;
            --shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 32px;
            box-shadow: var(--shadow);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 16px;
            font-size: 2rem;
            color: var(--primary);
        }

        .message {
            margin-bottom: 30px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text);
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(30,60,114,0.2);
        }
        .btn-primary:hover {
            background: var(--secondary);
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
            box-shadow: 0 4px 12px rgba(255,111,15,0.2);
        }
        .btn-secondary:hover {
            background: #e05e00;
            transform: translateY(-3px);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: white;
        }

        /* Dark mode toggle button (sun/moon) */
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.25s;
            margin: 0 auto 20px;
        }
        .theme-toggle:hover {
            background: var(--primary);
            color: white;
            transform: rotate(15deg);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Dark/Light toggle button -->
        <div class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
        </div>

        <h1>Welcome back!</h1>

        <div class="message">
            ✨ Stay a while or head back home – you're always welcome.<br>
            If you leave, we'll be here when you return.
        </div>

        <div class="button-group">
            <!-- Back to Home button (link) -->
            <a href="index.html" class="btn btn-outline">
                <i class="fas fa-home"></i> Back to Home
            </a>

            <!-- Logout button with confirmation -->
            <button class="btn btn-primary" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
        </div>

        <div class="footer-note">
            <i class="fas fa-heart" style="color: var(--secondary);"></i> ICYAGWE SHOP
        </div>
    </div>

    <script>
        (function() {
            // ----- DARK/LIGHT MODE -----
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('i');
            const body = document.body;

            // Load saved theme
            if (localStorage.getItem('theme') === 'dark') {
                body.classList.add('dark-mode');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }

            themeToggle.addEventListener('click', () => {
                body.classList.toggle('dark-mode');
                if (body.classList.contains('dark-mode')) {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                    localStorage.setItem('theme', 'dark');
                } else {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                    localStorage.setItem('theme', 'light');
                }
            });

            // ----- LOGOUT BUTTON -----
            const logoutBtn = document.getElementById('logoutBtn');
            logoutBtn.addEventListener('click', () => {
                if (confirm('Do you want to log out?')) {
                    alert('You have logged out. See you again soon!');
                    // Optional: redirect to a logged-out page
                    // window.location.href = 'logout.html';
                }
            });
        })();
    </script>
</body>
</html>
